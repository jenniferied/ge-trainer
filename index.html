<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#171425">
  <title>GE-Trainer</title>
  <script>
    // Theme vor dem ersten Paint setzen (kein Aufblitzen). Standard: Nachtmodus.
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("ge-trainer-v1") || "{}");
        if (s.theme === "hell") document.documentElement.setAttribute("data-theme", "hell");
      } catch (e) { /* Standard bleibt dunkel */ }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" aria-live="polite">
    <div class="laden">Einen Moment, die Fragen werden geladen &hellip;</div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
